; ============================================================
;  Heltec Vision Master T190 — LoRa RSSI Propagation Tester
;  ESP32-S3R8 | 8MB SiP Flash | 8MB OPI PSRAM
;  LoRa: HT-RA62 (SX1262 HF)  Display: 1.9" ST7789 170x320
; ============================================================

[env:heltec_vision_master_t190]
platform  = espressif32
board     = heltec_wifi_lora_32_V3
framework = arduino

; ---------- Flash / Memory ----------
board_build.flash_size          = 8MB
board_build.flash_mode          = qio
board_build.partitions          = default_8MB.csv
board_upload.flash_size         = 8MB
board_build.arduino.memory_type = qio_opi
board_build.psram_type          = opi

; ---------- CPU ----------
board_build.mcu   = esp32s3
board_build.f_cpu = 240000000L


    ; ── Arduino core flags ───────────────────────────────────
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DHELTEC_NO_DISPLAY=1
    -DBOARD_HAS_PSRAM


    ; ── RadioLib: exclude every module family except SX126x ──
    ; The compiler strips unused classes at link time anyway, but
    ; these flags make each .cpp file a near-empty stub so the
    ; preprocessor/parse stage is also faster on incremental builds.
    -DRADIOLIB_EXCLUDE_CC1101=1
    -DRADIOLIB_EXCLUDE_NRF24=1
    -DRADIOLIB_EXCLUDE_RF69=1
    -DRADIOLIB_EXCLUDE_SX1231=1
    -DRADIOLIB_EXCLUDE_SX1233=1
    -DRADIOLIB_EXCLUDE_SX127X=1
    -DRADIOLIB_EXCLUDE_SX1272=1
    -DRADIOLIB_EXCLUDE_SX1273=1
    -DRADIOLIB_EXCLUDE_SX1276=1
    -DRADIOLIB_EXCLUDE_SX1277=1
    -DRADIOLIB_EXCLUDE_SX1278=1
    -DRADIOLIB_EXCLUDE_SX1279=1
    -DRADIOLIB_EXCLUDE_SX128X=1
    -DRADIOLIB_EXCLUDE_STM32WL=1
    -DRADIOLIB_EXCLUDE_SI443X=1
    -DRADIOLIB_EXCLUDE_RFM2X=1
    -DRADIOLIB_EXCLUDE_RFM9X=1
    -DRADIOLIB_EXCLUDE_LR11X0=1
    -DRADIOLIB_EXCLUDE_LR1110=1
    -DRADIOLIB_EXCLUDE_LR1120=1
    -DRADIOLIB_EXCLUDE_LR1121=1
    -DRADIOLIB_EXCLUDE_LLCC68=1


; ---------- Upload ----------
upload_speed  = 921600
monitor_speed = 115200

; ---------- Libraries ----------
lib_deps =
    adafruit/Adafruit GFX Library @ ^1.11.9
    adafruit/Adafruit ST7735 and ST7789 Library @ ^1.10.3
    adafruit/Adafruit BusIO @ ^1.14.5
    jgromes/RadioLib @ ^6.6.0
